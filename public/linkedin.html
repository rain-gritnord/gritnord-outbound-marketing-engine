<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/GN_FAV-03.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Queue — Gritnord</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --surface: #0f0f0f;
      --border: #1a1a1a;
      --text: #f5f5f5;
      --muted: #c0c0c0;
      --accent: #e85d4a;
      --green: #22c55e;
      --yellow: #eab308;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
    }

    .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .logo span { opacity: 0.4; font-weight: 400; margin-left: 8px; }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.connected { background: var(--green); }

    .btn {
      padding: 8px 18px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #fff; color: #000; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-green { background: var(--green); color: #000; }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    main { max-width: 820px; margin: 0 auto; padding: 40px 24px; }

    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .page-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }

    .tabs {
      display: flex; gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }
    .empty p { margin-top: 8px; font-size: 13px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .source-badge {
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      background: #1a1a1a;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge {
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-badge.draft { background: #1a1a1a; color: var(--muted); }
    .status-badge.posted { background: #14532d; color: var(--green); }
    .status-badge.posting { background: #1c1917; color: var(--yellow); }

    .card-date { font-size: 11px; color: var(--muted); margin-left: auto; }

    .article-ref {
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .article-thumb {
      width: 64px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: #1a1a1a;
    }

    .article-info a {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }
    .article-info a:hover { text-decoration: underline; }
    .article-info p { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

    .post-text {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.7;
      resize: vertical;
      min-height: 160px;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    .post-text:focus { outline: none; border-color: #333; }

    .char-count { font-size: 11px; color: var(--muted); margin-bottom: 12px; margin-top: -12px; }
    .char-count.warn { color: var(--yellow); }
    .char-count.over { color: #ef4444; }

    .card-actions { display: flex; gap: 8px; }

    .linkedin-url {
      font-size: 12px;
      color: #0a66c2;
      text-decoration: none;
      margin-top: 8px;
      display: inline-block;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.25s;
      z-index: 99;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: #ef4444; color: #ef4444; }

    .loading { color: var(--muted); font-size: 13px; padding: 40px 0; text-align: center; }

    .connect-banner {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .connect-banner p { font-size: 13px; color: var(--muted); }
    .connect-banner p strong { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="logo">Gritnord <span>LinkedIn Queue</span></div>
  <div class="header-actions">
    <span id="status-indicator"><span class="status-dot" id="status-dot"></span><span id="status-text">Checking...</span></span>
    <button class="btn btn-outline btn-sm" onclick="generateDrafts()" id="gen-btn">Generate drafts</button>
    <a href="/dashboard.html" class="btn btn-outline btn-sm">← Dashboard</a>
  </div>
</header>

<main>
  <div class="page-title">LinkedIn Post Queue</div>
  <div class="page-sub">Review and approve posts before they go live. 3 drafts generated Mon / Wed / Fri.</div>

  <div id="connect-banner" class="connect-banner" style="display:none">
    <div>
      <p><strong>LinkedIn not connected.</strong></p>
      <p>Connect once to enable one-click posting from this queue.</p>
    </div>
    <a href="/auth/linkedin" class="btn btn-primary">Connect LinkedIn</a>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('drafts', this)">Drafts <span id="draft-count"></span></button>
    <button class="tab" onclick="switchTab('posted', this)">Posted</button>
    <button class="tab" onclick="switchTab('performance', this)">Performance</button>
  </div>

  <div id="queue-container"><div class="loading">Loading...</div></div>
  <div id="perf-container" style="display:none"></div>
</main>

<div class="toast" id="toast"></div>

<script>
let allPosts = [];
let currentTab = 'drafts';
let connected = false;

async function init() {
  await checkStatus();
  await loadQueue();
}

async function checkStatus() {
  try {
    const r = await fetch('/api/linkedin/status');
    const d = await r.json();
    connected = d.connected;
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    const banner = document.getElementById('connect-banner');
    if (d.connected) {
      dot.classList.add('connected');
      txt.textContent = 'Connected';
      banner.style.display = 'none';
    } else {
      txt.textContent = 'Not connected';
      banner.style.display = 'flex';
    }
  } catch {}
}

async function loadQueue() {
  const r = await fetch('/api/linkedin/queue');
  const d = await r.json();
  allPosts = d.posts || [];
  const draftCount = allPosts.filter(p => p.status === 'draft').length;
  document.getElementById('draft-count').textContent = draftCount ? `(${draftCount})` : '';
  renderTab();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'performance') {
    document.getElementById('queue-container').style.display = 'none';
    document.getElementById('perf-container').style.display = 'block';
    loadPerformance();
  } else {
    document.getElementById('queue-container').style.display = 'block';
    document.getElementById('perf-container').style.display = 'none';
    renderTab();
  }
}

function renderTab() {
  const posts = allPosts.filter(p => currentTab === 'drafts' ? p.status === 'draft' || p.status === 'posting' : p.status === 'posted');
  const container = document.getElementById('queue-container');

  if (!posts.length) {
    container.innerHTML = `<div class="empty">
      ${currentTab === 'drafts'
        ? '<div style="font-size:32px">✦</div><p>No drafts yet. Click "Generate drafts" or wait for the Monday cron.</p>'
        : '<div style="font-size:32px">✦</div><p>No posted content yet.</p>'}
    </div>`;
    return;
  }

  container.innerHTML = posts.map(post => renderCard(post)).join('');
}

function renderCard(post) {
  const article = post.article || {};
  const chars = (post.text || '').length;
  const charClass = chars > 3000 ? 'over' : chars > 2500 ? 'warn' : '';
  const date = new Date(post.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

  const articleHtml = article.title ? `
    <div class="article-ref">
      ${article.image ? `<img src="${article.image}" class="article-thumb" onerror="this.style.display='none'">` : ''}
      <div class="article-info">
        <a href="${article.link}" target="_blank">${article.title}</a>
        <p>${article.source || ''} · ${article.description?.slice(0, 100) || ''}${article.description?.length > 100 ? '…' : ''}</p>
      </div>
    </div>` : '';

  const engagementHtml = post.engagement
    ? `<div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--muted);">
        <span>👍 ${post.engagement.likes} likes</span>
        <span>💬 ${post.engagement.comments} comments</span>
        <span>🔁 ${post.engagement.shares} shares</span>
        ${post.engagementScore ? `<span style="color:var(--green);font-weight:600;">Score fed to learner: ${post.engagementScore}/10</span>` : ''}
       </div>` : '';

  const actionsHtml = post.status === 'posted'
    ? `<a href="${post.linkedInUrl}" target="_blank" class="linkedin-url">View on LinkedIn →</a>${engagementHtml}`
    : `<button class="btn btn-green btn-sm" onclick="approve('${post.id}')">↑ Post to LinkedIn</button>
       <button class="btn btn-outline btn-sm" onclick="saveEdit('${post.id}')">Save edits</button>
       <button class="btn btn-red btn-sm" onclick="discard('${post.id}')">Discard</button>`;

  return `
    <div class="card" id="card-${post.id}">
      <div class="card-meta">
        ${article.source ? `<span class="source-badge">${article.source}</span>` : ''}
        <span class="status-badge ${post.status}">${post.status}</span>
        <span class="card-date">${date}</span>
      </div>
      ${articleHtml}
      <textarea class="post-text" id="text-${post.id}" onkeyup="updateCount('${post.id}')">${post.text || ''}</textarea>
      <div class="char-count ${charClass}" id="count-${post.id}">${chars} chars</div>
      ${article.link ? `<div style="font-size:11px;color:var(--muted);margin-top:6px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:#0a0a0a;">🔗 Article link appended on post: <a href="${article.link}" target="_blank" style="color:#60a5fa;word-break:break-all;">${article.link}</a></div>` : ''}
      <div class="card-actions">${actionsHtml}</div>
    </div>`;
}

function updateCount(id) {
  const ta = document.getElementById(`text-${id}`);
  const el = document.getElementById(`count-${id}`);
  const n = ta.value.length;
  el.textContent = `${n} chars`;
  el.className = `char-count ${n > 3000 ? 'over' : n > 2500 ? 'warn' : ''}`;
}

async function saveEdit(id) {
  const text = document.getElementById(`text-${id}`).value;
  await fetch(`/api/linkedin/queue/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  });
  toast('Saved', 'success');
}

async function approve(id) {
  if (!connected) {
    toast('LinkedIn not connected — click Connect LinkedIn first', 'error');
    return;
  }
  await saveEdit(id);
  const btn = document.querySelector(`#card-${id} .btn-green`);
  if (btn) { btn.textContent = 'Posting…'; btn.disabled = true; }

  try {
    const r = await fetch(`/api/linkedin/approve/${id}`, { method: 'POST' });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    toast('Posted to LinkedIn!', 'success');
    await loadQueue();
  } catch (err) {
    toast(err.message, 'error');
    if (btn) { btn.textContent = '↑ Post to LinkedIn'; btn.disabled = false; }
  }
}

async function discard(id) {
  await fetch(`/api/linkedin/queue/${id}`, { method: 'DELETE' });
  toast('Discarded', 'success');
  await loadQueue();
}

async function generateDrafts() {
  const btn = document.getElementById('gen-btn');
  btn.textContent = 'Generating…';
  btn.disabled = true;
  try {
    const r = await fetch('/api/linkedin/generate', { method: 'POST' });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    toast(`${d.total} drafts ready`, 'success');
    await loadQueue();
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    btn.textContent = 'Generate drafts';
    btn.disabled = false;
  }
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 3000);
}

// ── Performance tab ───────────────────────────────────────────────────────────

async function loadPerformance() {
  const c = document.getElementById('perf-container');
  c.innerHTML = '<div class="loading">Loading analytics…</div>';
  try {
    const r = await fetch('/api/linkedin/analytics');
    const d = await r.json();
    c.innerHTML = renderPerformance(d);
  } catch (err) {
    c.innerHTML = `<div class="empty"><p>Failed to load analytics: ${err.message}</p></div>`;
  }
}

function scoreColor(s) {
  if (s === null) return 'var(--muted)';
  if (s >= 7) return 'var(--green)';
  if (s >= 5) return 'var(--yellow)';
  return '#ef4444';
}

function pct(n, max) { return Math.min(100, Math.round((n / max) * 100)); }

function trendLabel(scored) {
  if (scored.length < 2) return null;
  const half = Math.floor(scored.length / 2);
  const recent = scored.slice(0, half).map(p => p.score).filter(Boolean);
  const older  = scored.slice(half).map(p => p.score).filter(Boolean);
  if (!recent.length || !older.length) return null;
  const avgRecent = recent.reduce((a,b) => a+b,0) / recent.length;
  const avgOlder  = older.reduce((a,b) => a+b,0) / older.length;
  const diff = avgRecent - avgOlder;
  if (diff > 0.5)  return { label: `↑ +${diff.toFixed(1)} vs earlier posts`, color: 'var(--green)' };
  if (diff < -0.5) return { label: `↓ ${diff.toFixed(1)} vs earlier posts`, color: '#ef4444' };
  return { label: '→ Stable', color: 'var(--muted)' };
}

function renderPerformance({ learner, scored, pending, totalScored, totalPosted }) {
  const l = learner;
  const hasSome = totalScored > 0;
  const trend = trendLabel(scored);

  const avgPct = l.avgScore ? pct(l.avgScore, 10) : 0;
  const sucPct = l.successRate ? pct(l.successRate * 100, 100) : 50;
  const priPct = l.priority   ? pct((l.priority - 0.1) / 1.9 * 100, 100) : 50;

  // Learner state card
  const learnerCard = `
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
      <div>
        <div style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Learner State — LinkedIn</div>
        <div style="font-size:20px;font-weight:700;">${totalScored} post${totalScored !== 1 ? 's' : ''} scored · ${totalPosted} total posted</div>
      </div>
      ${trend ? `<div style="font-size:13px;font-weight:600;color:${trend.color};background:${trend.color}22;padding:6px 14px;border-radius:999px;">${trend.label}</div>` : ''}
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
      ${statBar('Avg engagement score', l.avgScore != null ? `${l.avgScore.toFixed(1)} / 10` : '—', avgPct, scoreColor(l.avgScore))}
      ${statBar('Success rate', l.successRate != null ? `${Math.round(l.successRate * 100)}%` : '—', sucPct, '#60a5fa', 'Posts scoring ≥ 6/10')}
      ${statBar('Channel priority', l.priority != null ? l.priority.toFixed(3) : '—', priPct, '#a78bfa', 'Drives how often engine picks LinkedIn')}
    </div>

    ${!hasSome ? `<div style="margin-top:16px;font-size:13px;color:var(--muted);">⏳ Engagement scores are pulled 48–72h after each post is published. Check back after your first post has been live for 2 days.</div>` : ''}
    <div style="margin-top:16px;display:flex;gap:10px;">
      <button class="btn btn-outline btn-sm" onclick="syncEngagement()">↻ Pull engagement now</button>
    </div>
  </div>`;

  // Scored posts table
  const tableRows = scored.map(p => {
    const date = p.postedAt ? new Date(p.postedAt).toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '—';
    const bar = p.score != null
      ? `<div style="display:flex;align-items:center;gap:8px;">
           <div style="flex:1;height:6px;background:var(--border);border-radius:3px;">
             <div style="width:${pct(p.score,10)}%;height:100%;background:${scoreColor(p.score)};border-radius:3px;"></div>
           </div>
           <span style="color:${scoreColor(p.score)};font-weight:600;font-size:13px;min-width:28px;">${p.score}</span>
         </div>`
      : '<span style="color:var(--muted)">—</span>';
    const link = p.linkedInUrl ? `<a href="${p.linkedInUrl}" target="_blank" style="color:#60a5fa;font-size:11px;">↗ View</a>` : '';
    return `<tr style="border-top:1px solid var(--border);">
      <td style="padding:12px 8px;color:var(--muted);font-size:12px;white-space:nowrap;">${date}</td>
      <td style="padding:12px 8px;font-size:13px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.text.replace(/"/g,'')}">${p.text}</td>
      <td style="padding:12px 8px;text-align:center;font-size:13px;">👍 ${p.likes}</td>
      <td style="padding:12px 8px;text-align:center;font-size:13px;">💬 ${p.comments}</td>
      <td style="padding:12px 8px;text-align:center;font-size:13px;">🔁 ${p.shares}</td>
      <td style="padding:12px 8px;min-width:120px;">${bar}</td>
      <td style="padding:12px 8px;">${link}</td>
    </tr>`;
  }).join('');

  const table = scored.length ? `
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;">
    <div style="font-size:15px;font-weight:600;margin-bottom:16px;">Post scores</div>
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;">
          <th style="padding:0 8px 10px;text-align:left;font-weight:500;">Date</th>
          <th style="padding:0 8px 10px;text-align:left;font-weight:500;">Post</th>
          <th style="padding:0 8px 10px;text-align:center;font-weight:500;">Likes</th>
          <th style="padding:0 8px 10px;text-align:center;font-weight:500;">Comments</th>
          <th style="padding:0 8px 10px;text-align:center;font-weight:500;">Shares</th>
          <th style="padding:0 8px 10px;font-weight:500;">Score</th>
          <th style="padding:0 8px 10px;font-weight:500;"></th>
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>
  </div>` : '';

  // Pending (posted but not yet scored)
  const pendingRows = pending.map(p => {
    const date = p.postedAt ? new Date(p.postedAt).toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '—';
    const age  = p.postedAt ? Math.round((Date.now() - new Date(p.postedAt)) / 3600000) : null;
    const ready = age != null && age >= 48;
    return `<tr style="border-top:1px solid var(--border);">
      <td style="padding:10px 8px;color:var(--muted);font-size:12px;">${date}</td>
      <td style="padding:10px 8px;font-size:13px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.text}</td>
      <td style="padding:10px 8px;font-size:12px;color:${ready ? 'var(--yellow)' : 'var(--muted)'};">${age != null ? (ready ? `Ready (${age}h old)` : `${age}h — pulls at 48h`) : '—'}</td>
    </tr>`;
  }).join('');

  const pendingTable = pending.length ? `
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;">
    <div style="font-size:15px;font-weight:600;margin-bottom:4px;">Awaiting engagement data</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">Scores are pulled automatically every 6 hours once posts are 48h old</div>
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;">
          <th style="padding:0 8px 10px;text-align:left;font-weight:500;">Date</th>
          <th style="padding:0 8px 10px;text-align:left;font-weight:500;">Post</th>
          <th style="padding:0 8px 10px;text-align:left;font-weight:500;">Status</th>
        </tr>
      </thead>
      <tbody>${pendingRows}</tbody>
    </table>
  </div>` : '';

  return learnerCard + table + pendingTable;
}

function statBar(label, value, pctVal, color, tooltip = '') {
  return `<div style="background:#0a0a0a;border:1px solid var(--border);border-radius:12px;padding:16px;">
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;" title="${tooltip}">${label}</div>
    <div style="font-size:22px;font-weight:700;color:${color};margin-bottom:10px;">${value}</div>
    <div style="height:6px;background:var(--border);border-radius:3px;">
      <div style="width:${pctVal}%;height:100%;background:${color};border-radius:3px;transition:width .4s;"></div>
    </div>
  </div>`;
}

async function syncEngagement() {
  const r = await fetch('/api/linkedin/engagement/sync', { method: 'POST' });
  const d = await r.json();
  toast(`Scored ${d.scored} post(s)`, 'success');
  loadPerformance();
}

init();
</script>
</body>
</html>
