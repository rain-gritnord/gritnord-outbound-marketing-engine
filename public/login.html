<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/GN_FAV-03.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Gritnord</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --card: #0d0d0d;
      --border: #1e1e1e;
      --text: #f5f5f5;
      --muted: #666;
      --muted-light: #999;
      --input-bg: #0a0a0a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.4px;
      margin-bottom: 40px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 20px;
    }

    .badge::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e879f9, #3b82f6);
      display: inline-block;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted-light);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Google button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f0f0f;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .btn-google:hover {
      border-color: #333;
      background: #141414;
    }

    .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    form { display: flex; flex-direction: column; gap: 12px; }

    .field {
      position: relative;
    }

    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.15s;
      outline: none;
    }

    input[type="password"]::placeholder { color: var(--muted); }
    input[type="password"]:focus { border-color: #333; }

    .btn-submit {
      width: 100%;
      padding: 13px;
      border-radius: 9999px;
      border: none;
      background: #f5f5f5;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    .btn-submit:hover { opacity: 0.88; }

    .error-msg {
      display: none;
      background: #1a0a0a;
      border: 1px solid #3f1111;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #f87171;
      margin-bottom: 8px;
    }

    .error-msg.show { display: block; }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* Holo strip at top */
    .holo {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%, #e879f9 15%, #f97316 30%,
        #a855f7 50%, #3b82f6 70%, #06b6d4 85%, transparent 100%);
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div class="holo"></div>

<div class="logo">Gritnord</div>

<div class="card">
  <div class="badge">Invite only</div>
  <h1>Sign in</h1>
  <p class="subtitle">Internal tools — authorised access only.</p>

  <a href="/auth/google" class="btn-google" id="google-btn">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </a>

  <div class="divider">or use invite code</div>

  <div id="error-msg" class="error-msg">Incorrect invite code. Try again.</div>

  <form method="POST" action="/auth/login">
    <input type="hidden" name="next" value="" id="next-field">
    <div class="field">
      <input type="password" name="password" placeholder="Invite code" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-submit">Continue →</button>
  </form>
</div>

<footer>© 2026 Gritnord OÜ · Internal use only</footer>

<script>
  // Preserve ?next= through both login methods
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next') || '/dashboard.html';

  document.getElementById('next-field').value = next;

  const googleBtn = document.getElementById('google-btn');
  googleBtn.href = '/auth/google?next=' + encodeURIComponent(next);

  if (params.get('error')) {
    document.getElementById('error-msg').classList.add('show');
  }
</script>
</body>
</html>
